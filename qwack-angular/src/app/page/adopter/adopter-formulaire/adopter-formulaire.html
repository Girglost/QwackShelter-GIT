<section class="adoption-form">

  <div class="container">

    <h1>Demande d'adoption</h1>

    <p class="subtitle">
      Merci de remplir ce formulaire. Notre équipe reviendra vers vous rapidement.
    </p>

    <form [formGroup]="adoptionForm" (ngSubmit)="onSubmit()">

      <div class="grid">

        <div class="field">
          <label>Nom*</label>
          <input type="text" formControlName="nom">
        </div>

        <div class="field">
          <label>Prénom*</label>
          <input type="text" formControlName="prenom">
        </div>

        <div class="field">
          <label>Email*</label>
          <input type="email" formControlName="email">
        </div>

        <div class="field">
          <label>Téléphone (facultatif)</label>
          <input type="tel" formControlName="telephone">
        </div>

        <div class="field full">
          <label>Adresse*</label>
          <input type="text" formControlName="adresse">
        </div>


        <div class="field full">

          <label for="animal">
            Animal souhaité*
          </label>



          <select formControlName="animalId">


            <option value="">
              Choisir un animal
            </option>


            @for (animal of animauxPresent$ | async; track animal.id) {

            <option [value]="animal.id">
              {{animal.id}} - {{ animal.nomAnimal }} - {{ animal.typeAnimal }}
            </option>

            }


          </select>

        </div>



        <div class="field">
          <label>Type de logement*</label>

          <select formControlName="logement">
            <option value="">Choisir...</option>
            <option value="APPARTEMENT">Appartement</option>
            <option value="MAISON">Maison</option>
          </select>
        </div>

        <div class="field">
          <label>Possédez-vous un jardin ?*</label>

          <select formControlName="jardin">
            <option value="">Choisir...</option>
            <option value="oui">Oui</option>
            <option value="non">Non</option>
          </select>
        </div>

        <div class="field full">
          <label>Pourquoi souhaitez-vous adopter ?*</label>

          <textarea rows="5" formControlName="motivation">
          </textarea>
        </div>

      </div>

      <button class="btn" type="submit" [disabled]="adoptionForm.invalid">
        Envoyer ma demande
      </button>

    </form>

  </div>

</section>
